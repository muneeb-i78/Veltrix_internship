<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 7 - Landing Page Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Join Our Learning Platform</h1>
    <p>Login or create your account in seconds</p>
  </section>

  <!-- FORM WRAPPER -->
  <div class="container">

    <!-- TABS -->
    <div class="tabs">
      <button class="active" onclick="showTab(event, 'login')">Login</button>
      <button onclick="showTab(event, 'signup')">Sign Up</button>
    </div>

    <div class="form-card">

      <!-- LOGIN -->
      <div class="form-section active" id="login">
        <form onsubmit="loginUser(event)">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter email">

          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password">

          <button type="submit">Login</button>
          <p id="loginMsg"></p>
        </form>
      </div>

      <!-- SIGNUP -->
      <div class="form-section" id="signup">
        <form onsubmit="signupUser(event)">
          <label>Name</label>
          <input type="text" id="name" placeholder="Full name">

          <label>Email</label>
          <input type="email" id="email" placeholder="Enter email">

          <label>Password</label>
          <input type="password" id="password" placeholder="Create password">

          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm password">

          <button type="submit">Sign Up</button>
          <p id="signupMsg"></p>
        </form>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
