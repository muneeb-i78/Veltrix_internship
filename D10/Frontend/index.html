<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontend Backend Connect</title>
</head>
<body>

  <h1>Frontend</h1>

  <button onclick="getMessage()">Get Message</button>

  <p id="output"></p>

  <script>
    function getMessage() {

      fetch("http://localhost:3000/hello")
        .then(response => response.json())
        .then(data => {
          document.getElementById("output").innerText = data.message;
        })
        .catch(error => {
          document.getElementById("output").innerText = "Error connecting";
        });

    }
  </script>

</body>
</html>
